name: Build Musl ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build musl arm64 binary via Zig CC
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC="zig cc -target aarch64-linux-musl" CXX="zig c++ -target aarch64-linux-musl" go build \
            -ldflags="-s -w" \
            -o ./cli-proxy-api-musl-arm64 ./cmd/server/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-proxy-api-musl-arm64
          path: ./cli-proxy-api-musl-arm64
